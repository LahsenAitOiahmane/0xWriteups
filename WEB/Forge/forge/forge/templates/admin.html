<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body {
            background: #000;
            color: #0f0;
            font-family: 'Consolas', monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
        }
        
        table {
            border-collapse: collapse;
            width: 80%;
            max-width: 600px;
            margin-top: 20px;
        }
        
        th, td {
            border: 2px solid #0f0;
            padding: 10px;
            text-align: left;
        }
        
        th {
            background: #0f0;
            color: #000;
        }
    </style>
</head>
<body>
    <h1>Critical System Accounts</h1>
    
    <table>
            <tr>
                <th>Username</th>
                <th>Role</th>
            </tr>
            {% for user in users %}
            <tr>
                <td>{{ user.username }}</td>
                <td>{{ user.role }}</td>
            </tr>
            {% endfor %}
        </table>

    <br>
</body>
</html>
